## family = "BlexMonoNerdFontMono"
[window]
dimensions = { columns = 100, lines = 30 }
decorations = "None"

[window.padding]
x = 10
y = 10

[font]
size = 14

[font.normal]
family = "InconsolataLGCNerdFont"
style = "Regular"

[font.bold]
family = "InconsolataLGCNerdFont"
style = "Bold"

[font.italic]
family = "InconsolataLGCNerdFont"
style = "Italic"

[font.bold_italic]
family = "InconsolataLGCNerdFont"
style = "Bold Italic"

# Default colors
[colors.primary]
background = '#2E3440'
foreground = '#D8DEE9'

# Normal colors
[colors.normal]
black   = '#3B4252'
red     = '#BF616A'
green   = '#A3BE8C'
yellow  = '#EBCB8B'
blue    = '#81A1C1'
magenta = '#B48EAD'
cyan    = '#88C0D0'
white   = '#E5E9F0'

# Bright colors
[colors.bright]
black   = '#4C566A'
red     = '#BF616A'
green   = '#A3BE8C'
yellow  = '#EBCB8B'
blue    = '#81A1C1'
magenta = '#B48EAD'
cyan    = '#8FBCBB'
white   = '#ECEFF4'

